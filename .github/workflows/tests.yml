name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall -q src app.py api_server.py

      - name: Run offline tests
        env:
          USE_MOCK_DATA: "true"
        run: python -m pytest -q -m "not eval"
